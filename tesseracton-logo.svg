  <!-- Wordmark -->
  <text x="218" y="108"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="700" letter-spacing="1"
        fill="url(#word)">Tesseracton</text>

  <!-- Tagline -->
  <text x="221" y="138"
        font-family="'Helvetica Neue', Arial, sans-serif"
